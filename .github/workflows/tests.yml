name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: qgis/qgis:latest

    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Python dependencies
        # gflex 2.0.0b1 (latest PyPI pre-release) lacks the 'infinite' BC alias
        # and has a bc_west AttributeError bug; install from git until 2.0.0 final.
        run: python3 -m pip install --break-system-packages 'git+https://github.com/awickert/gFlex.git' pytest

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short
        env:
          PROJ_DATA: /usr/share/proj
          QGIS_PREFIX_PATH: /usr
          QT_QPA_PLATFORM: offscreen
